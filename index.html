<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVADIGIT | Digital Engineering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <button id="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>

        <div id="logo-container">
            <span class="logo-blue">AVA</span><span class="logo-white">DIGIT</span>
        </div>
    </header>

    <nav id="side-menu">
        <button class="close-btn" onclick="toggleMenu()">&times;</button>
        <ul>
            <li><a href="#home" onclick="toggleMenu()">Home</a></li>
            <li><a href="#services" onclick="toggleMenu()">Services</a></li>
            <li><a href="#resources" onclick="toggleMenu()">Resources</a></li>
            <li><a href="#contacts" onclick="toggleMenu()">Contacts</a></li>
        </ul>
    </nav>

    <div id="hero-background">
        <div class="background-overlay"></div>
        <div id="terminal">
            <div id="output"></div>
            <div id="input-line">
                <span class="prompt">[root@AVADIGIT ~]#</span>
                <span id="typer"></span>
                <span class="cursor">█</span>
            </div>
        </div>
    </div>

    <a href="https://wa.me/yournumber" class="chat-status-bar">
        <div class="online-indicator"></div>
        <span>Chat with us—we are online</span>
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
