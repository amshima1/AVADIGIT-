<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Cloud | Partner in Digital Transformation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <div class="logo-container">
            <span class="logo-blue">neo</span><span class="logo-white">cloud</span>
        </div>
        <button id="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <main id="hero-section">
        <div class="background-overlay"></div>
        
        <div class="hero-content">
            <h1>Your Digital Transformation Journey</h1>
            
            <p id="typer-text"><span class="cursor">|</span></p>
        </div>
    </main>

    <div id="whatsapp-container">
        <a href="#" class="whatsapp-bubble">
            <i class="fab fa-whatsapp"></i>
        </a>
        <div class="chat-status">
            <span>Online</span><strong>Chat with us</strong>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
